# Phase 2E — wp-content/uploads → MinIO media copy
# Run AFTER Phase 2D (requires media records in DB from MEDIA domain import)
# Run with: java -jar bigbike-backend-*.jar --spring.config.additional-location=file:///s:/project/bigbike/docs/audits/migration-phase2e.properties

spring.main.web-application-type=none
spring.flyway.enabled=true

# DB
spring.datasource.url=jdbc:postgresql://localhost:5432/bigbike
spring.datasource.username=bigbike
spring.datasource.password=bigbike_dev_only

# Stub values
bigbike.jwt.secret=dev-migration-only-not-prod-needs-32chars
bigbike.cors.allowed-origins=http://localhost:3000
bigbike.cookies.secure=false
bigbike.media.public-base-url=http://localhost:9000/bigbike-media

# MinIO
bigbike.minio.endpoint=http://localhost:9000
bigbike.minio.access-key=minio_admin
bigbike.minio.secret-key=minio_dev_only
bigbike.minio.bucket=bigbike-media

# WordPress migration — Phase 2E: media copy to MinIO
bigbike.migration.wordpress.enabled=true
bigbike.migration.wordpress.sql-dump-path=S:/project/bigbike/bigbike_vn__2026_04_17/sqldump.sql
bigbike.migration.wordpress.uploads-path=S:/project/bigbike/bigbike_vn__2026_04_17/files/wp-content/uploads
bigbike.migration.wordpress.table-prefix=kd_
bigbike.migration.wordpress.dry-run=false
bigbike.migration.wordpress.mode=media-copy
bigbike.migration.wordpress.confirm-execute=true
bigbike.migration.wordpress.environment=local
bigbike.migration.wordpress.minio-endpoint=http://localhost:9000
bigbike.migration.wordpress.minio-access-key=minio_admin
bigbike.migration.wordpress.minio-secret-key=minio_dev_only
bigbike.migration.wordpress.minio-bucket=bigbike-media
