# Phase 2D — DB import (chạy trong Docker container)
spring.main.web-application-type=none
spring.flyway.enabled=true

spring.datasource.url=jdbc:postgresql://postgres:5432/bigbike
spring.datasource.username=bigbike
spring.datasource.password=bigbike_dev_only

bigbike.jwt.secret=dev-migration-only-not-prod-needs-32chars
bigbike.cors.allowed-origins=http://localhost:3000
bigbike.cookies.secure=false
bigbike.media.public-base-url=http://localhost:9000/bigbike-media

bigbike.minio.endpoint=http://minio:9000
bigbike.minio.access-key=minio_admin
bigbike.minio.secret-key=minio_dev_only
bigbike.minio.bucket=bigbike-media

bigbike.migration.wordpress.enabled=true
bigbike.migration.wordpress.sql-dump-path=/wpbackup/sqldump.sql
bigbike.migration.wordpress.uploads-path=/wpbackup/files/wp-content/uploads
bigbike.migration.wordpress.table-prefix=kd_
bigbike.migration.wordpress.dry-run=false
bigbike.migration.wordpress.mode=import
bigbike.migration.wordpress.confirm-execute=true
bigbike.migration.wordpress.environment=local
bigbike.migration.wordpress.batch-size=200
bigbike.migration.wordpress.domains=CATEGORIES,BRANDS,MEDIA,PRODUCTS,PRODUCT_VARIATIONS,PRODUCT_TAGS,PRODUCT_REVIEWS

bigbike.migration.wordpress.minio-endpoint=http://minio:9000
bigbike.migration.wordpress.minio-access-key=minio_admin
bigbike.migration.wordpress.minio-secret-key=minio_dev_only
bigbike.migration.wordpress.minio-bucket=bigbike-media
