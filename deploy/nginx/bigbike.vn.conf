# ==============================================================================
# Nginx Configuration for bigbike.vn (Main Website — Next.js)
# Requires shared-config.conf for upstream and rate-limit zone definitions.
# ==============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name bigbike.vn www.bigbike.vn;

    access_log /var/log/nginx/bigbike.vn-http-access.log;
    error_log /var/log/nginx/bigbike.vn-http-error.log;

    return 301 https://bigbike.vn$request_uri;
}

# www → canonical redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.bigbike.vn;

    ssl_certificate /etc/ssl/bigbike.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/bigbike.vn/private.key;

    return 301 https://bigbike.vn$request_uri;
}

# HTTPS — Main Website
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bigbike.vn;

    # ==================== SSL ====================
    ssl_certificate /etc/ssl/bigbike.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/bigbike.vn/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MainSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== Security Headers ====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==================== Logs ====================
    access_log /var/log/nginx/bigbike.vn-access.log;
    error_log /var/log/nginx/bigbike.vn-error.log warn;

    # ==================== Client Settings ====================
    client_body_timeout 60s;
    client_header_timeout 30s;
    client_max_body_size 10m;

    # ==================== Proxy to Next.js ====================
    location / {
        limit_req zone=general_limit burst=30 nodelay;

        proxy_pass http://main_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
