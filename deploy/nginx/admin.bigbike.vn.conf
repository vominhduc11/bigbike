# ==============================================================================
# Nginx Configuration for admin.bigbike.vn (Admin Dashboard — Vite/React)
# Requires shared-config.conf for upstream definitions.
# ==============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name admin.bigbike.vn;

    access_log /var/log/nginx/admin.bigbike.vn-http-access.log;
    error_log /var/log/nginx/admin.bigbike.vn-http-error.log;

    return 301 https://$host$request_uri;
}

# HTTPS — Admin Dashboard
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.bigbike.vn;

    # ==================== SSL ====================
    ssl_certificate /etc/ssl/admin.bigbike.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/admin.bigbike.vn/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:AdminSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== Security Headers ====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==================== Logs ====================
    access_log /var/log/nginx/admin.bigbike.vn-access.log;
    error_log /var/log/nginx/admin.bigbike.vn-error.log warn;

    # ==================== Client Settings ====================
    client_body_timeout 60s;
    client_header_timeout 30s;
    client_max_body_size 20m;

    # ==================== Proxy to Admin (Vite SPA) ====================
    location / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
