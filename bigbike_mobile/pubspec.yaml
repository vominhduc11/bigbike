name: bigbike_mobile
description: BigBike mobile app — Flutter companion to bigbike-web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.6.2

  # HTTP + cookies
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.0
  path_provider: ^2.1.5

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Images
  cached_network_image: ^3.4.1

  # UI
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  flutter_widget_from_html: ^0.15.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
