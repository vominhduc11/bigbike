<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>BigBike — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="../../assets/favicon/favicon-01.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
</head>
<body class="wp-home bb-theme-dark">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="SharedComponents.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="CatalogPage.jsx"></script>
<script type="text/babel" src="ProductDetailPage.jsx"></script>
<script type="text/babel" src="CartPage.jsx"></script>
<script type="text/babel" src="CheckoutPage.jsx"></script>
<script type="text/babel" src="AccountPage.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "searchLayout": "header-drop",
    "showRecent": true,
    "showShortcuts": true,
    "resultCount": 6,
    "accentColor": "#f90606"
  }/*EDITMODE-END*/;

  const SEED_CART = [
    { id: 1, brand: "LS2", name: "LS2 MX436 Pioneer Dual Sport", category: "Mũ bảo hiểm", price: 2590000, old: 3240000, qty: 1, size: "L", color: "Matte Black" },
    { id: 3, brand: "Scoyco", name: "Scoyco MC08 Găng Tay Touring", category: "Găng tay", price: 420000, old: 520000, qty: 2, size: "XL", color: "Đen" },
    { id: 4, brand: "Sena", name: "Sena 50S Mesh Intercom", category: "Intercom", price: 8490000, qty: 1, color: "Single Pack" },
  ];

  function App() {
    const [page, setPage] = useState("home");
    const [cartItems, setCartItems] = useState(SEED_CART);
    const [toast, setToast] = useState(null);
    const [pdpProduct, setPdpProduct] = useState(null);
    const [catCategory, setCatCategory] = useState(null);
    const [lastOrder, setLastOrder] = useState(null);
    const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

    const cartCount = cartItems.reduce((s, it) => s + it.qty, 0);

    const addToCart = (product) => {
      setCartItems((items) => {
        const found = items.find((it) => it.id === product.id);
        if (found) return items.map((it) => it.id === product.id ? { ...it, qty: it.qty + 1 } : it);
        return [...items, { ...product, qty: 1, size: "M", color: "Đen" }];
      });
      setToast(product);
    };
    const updateQty = (id, qty) => setCartItems((items) => items.map((it) => it.id === id ? { ...it, qty } : it));
    const removeItem = (id) => setCartItems((items) => items.filter((it) => it.id !== id));

    const goTo = (p) => {
      setPage(p);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    const openProduct = (p) => { setPdpProduct(p); goTo("pdp"); };
    const openCatalog = (c) => { setCatCategory(c || null); goTo("catalog"); };

    return (
      <>
        <PromoStrip />
        <SiteHeader
          cartCount={cartCount}
          activePage={page === "pdp" ? "catalog" : page}
          searchTweaks={tweaks}
          onNav={(p) => {
            if (p === "catalog") openCatalog(null);
            else goTo(p);
          }}
        />
        {page === "home"     && <HomePage onAdd={addToCart} onCategory={openCatalog} onViewAll={() => openCatalog(null)} />}
        {page === "catalog"  && <CatalogPage onAdd={addToCart} onOpenProduct={openProduct} category={catCategory} />}
        {page === "pdp"      && <ProductDetailPage product={pdpProduct} onAdd={addToCart} onBack={() => goTo("catalog")} />}
        {page === "cart"     && <CartPage items={cartItems} onQty={updateQty} onRemove={removeItem} onCheckout={() => goTo("checkout")} onContinue={() => goTo("home")} />}
        {page === "checkout" && <CheckoutPage items={cartItems} onBack={() => goTo("cart")} onComplete={(o) => { setLastOrder(o); setCartItems([]); goTo("success"); }} />}
        {page === "success"  && <CheckoutSuccess order={lastOrder} onGoHome={() => goTo("home")} onTrack={() => goTo("account")} />}
        {page === "account"  && <AccountPage onLogout={() => goTo("home")} onShop={() => goTo("home")} />}
        {!["home","catalog","pdp","cart","checkout","success","account"].includes(page) && (
          <div style={{ maxWidth: 1440, margin: "80px auto", padding: "0 24px", minHeight: 400 }}>
            <div style={{ padding: 60, textAlign: "center", border: "1px dashed rgba(255,255,255,0.12)", borderRadius: 8 }}>
              <div style={{ fontFamily: "var(--bb-font-display)", fontSize: 28, textTransform: "uppercase", marginBottom: 10 }}>Chưa có trong UI Kit</div>
              <p style={{ color: "var(--bb-text-muted)", marginBottom: 18 }}>Trang <b style={{ color: "#fff" }}>{page}</b> chưa được recreate. Quay lại <a style={{ color: "var(--bb-brand-primary)", cursor: "pointer" }} onClick={() => goTo("home")}>Trang chủ</a>.</p>
            </div>
          </div>
        )}
        <SiteFooter />
        <FloatingChat />
        <Toast product={toast} onClose={() => setToast(null)} />
        <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}>
          <TweakSection label="Search Overlay">
            <TweakRadio id="searchLayout" label="Layout" options={[
              { value: "header-drop", label: "Dropdown từ header" },
              { value: "centered",    label: "Centered modal" },
            ]} />
            <TweakToggle id="showRecent"    label="Hiện tìm kiếm gần đây" />
            <TweakToggle id="showShortcuts" label="Hiện phím tắt footer" />
            <TweakSlider id="resultCount"   label="Số sản phẩm hiện" min={3} max={12} step={1} />
            <TweakColor  id="accentColor"   label="Màu nhấn" />
          </TweakSection>
        </TweaksPanel>

        {/* Page switcher — quick nav between UI kit screens */}
        <div className="wp-page-switcher">
          <div className="wp-ps-label">UI KIT · PAGES</div>
          <div className="wp-ps-buttons">
            {[
              { k: "home", l: "Home" },
              { k: "catalog", l: "Catalog" },
              { k: "pdp", l: "PDP" },
              { k: "cart", l: "Cart" },
              { k: "checkout", l: "Checkout" },
              { k: "success", l: "Success" },
              { k: "account", l: "Account" },
            ].map((b) => (
              <button key={b.k} className={page === b.k ? "active" : ""} onClick={() => {
                if (b.k === "pdp" && !pdpProduct) setPdpProduct(window.BB_PRODUCTS[0]);
                goTo(b.k);
              }}>{b.l}</button>
            ))}
          </div>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<style>
.wp-page-switcher { position: fixed; bottom: 20px; left: 20px; z-index: 50; background: rgba(10,10,10,0.92); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 10px 12px; box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
.wp-ps-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--bb-brand-primary); margin-bottom: 6px; text-transform: uppercase; }
.wp-ps-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
.wp-ps-buttons button { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.75); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-family: var(--bb-font-body); transition: all 140ms; }
.wp-ps-buttons button:hover { border-color: rgba(255,255,255,0.32); color: #fff; }
.wp-ps-buttons button.active { background: var(--bb-brand-primary); border-color: var(--bb-brand-primary); color: #fff; }
</style>
</body>
</html>
