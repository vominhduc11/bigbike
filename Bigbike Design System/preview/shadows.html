<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: #050505; color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 26px 26px 30px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 22px 0; color: var(--bb-text-muted); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .box { background: #141414; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; height: 82px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 4px; }
  .box b { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .box span { font-size: 10px; color: var(--bb-text-muted); letter-spacing: 0.02em; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">ELEVATION</div>
  <div class="row">
    <div class="box" style="box-shadow: 0 2px 8px rgba(0,0,0,0.24)"><b>SM</b><span>card rest</span></div>
    <div class="box" style="box-shadow: 0 8px 24px rgba(0,0,0,0.32)"><b>MD</b><span>card hover</span></div>
    <div class="box" style="box-shadow: 0 18px 48px rgba(0,0,0,0.42)"><b>LG</b><span>modal / drawer</span></div>
    <div class="box" style="box-shadow: 0 12px 30px rgba(249,6,6,0.32);border-color:rgba(249,6,6,0.4)"><b>BRAND</b><span>primary CTA</span></div>
  </div>
</div>
</body>
</html>
