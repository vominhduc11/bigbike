<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Brand — Primary Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 16px 18px; display:grid; grid-template-columns: 1.2fr 1fr; gap: 16px; align-items: stretch; }
  .tile { background: radial-gradient(circle at 30% 30%, #1a1a1a, #050505 80%); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; display:flex; align-items:center; justify-content:center; padding: 14px; position: relative; min-height: 180px; }
  .tile img { max-width: 100%; max-height: 180px; object-fit: contain; }
  .tile.light { background: #fff; }
  .lbl { position: absolute; top: 8px; left: 10px; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 700; }
  .tile.light .lbl { color: rgba(0,0,0,0.4); }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="tile"><span class="lbl">PRIMARY · DARK</span><img src="../assets/logo/bigbike-logo-primary.png" alt="BigBike primary logo"></div>
  <div class="tile light"><span class="lbl">PRIMARY · LIGHT</span><img src="../assets/logo/bigbike-logo-primary.png" alt="BigBike primary logo"></div>
</div>
</body>
</html>
