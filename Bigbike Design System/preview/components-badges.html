<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 14px 0; color: var(--bb-text-muted); }
  .section { display:flex; flex-wrap:wrap; gap: 10px; margin-bottom: 16px; align-items:center; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bb-text-muted); width: 90px; flex-shrink:0; }
  .b { padding: 5px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 3px; }
  .bar { padding: 6px 12px; font-weight: 700; font-size: 12px; letter-spacing: 0.06em; color:#fff; background:#f90606; display:inline-block; }
  .burner { display:inline-block; padding: 8px 16px; background: #f90606; color: #fff; font-family: var(--bb-font-display); letter-spacing: 0.04em; font-size: 13px; clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%); }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">BADGES &amp; CHIPS</div>
  <div class="section"><div class="lbl">Stock</div>
    <span class="b" style="background:rgba(98,187,70,0.14);color:#62bb46;border:1px solid rgba(98,187,70,0.34)">Còn hàng</span>
    <span class="b" style="background:rgba(249,157,28,0.14);color:#f99d1c;border:1px solid rgba(249,157,28,0.34)">Sắp hết</span>
    <span class="b" style="background:rgba(249,6,6,0.14);color:#f90606;border:1px solid rgba(249,6,6,0.38)">Hết hàng</span>
    <span class="b" style="background:rgba(32,196,244,0.14);color:#20c4f4;border:1px solid rgba(32,196,244,0.34)">Đặt trước</span>
  </div>
  <div class="section"><div class="lbl">Promo</div>
    <span class="bar">-20%</span>
    <span class="burner">HOT OFFER</span>
    <span class="b" style="background:#fff;color:#f90606;border:1px solid #fff">NEW</span>
    <span class="b" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3)">CHÍNH HÃNG</span>
  </div>
  <div class="section"><div class="lbl">Variant</div>
    <span class="b" style="background:#202020;color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:999px">M</span>
    <span class="b" style="background:#202020;color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:999px">L</span>
    <span class="b" style="background:#f90606;color:#fff;border:1px solid #f90606;border-radius:999px">XL ◄</span>
    <span class="b" style="background:#202020;color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.1);border-radius:999px;text-decoration:line-through">XXL</span>
  </div>
</div>
</body>
</html>
