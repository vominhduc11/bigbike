<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Shape — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 16px 0; color: var(--bb-text-muted); }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .box { background: var(--bb-bg-surface-raised); border: 1px solid var(--bb-border-default); height: 72px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 4px; }
  .box b { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .box span { font-size: 10px; color: var(--bb-text-muted); }
  .brand-tag { margin-top: 14px; font-size: 10px; color: var(--bb-text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .brand-tag em { color: var(--bb-brand-primary); font-style: normal; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">RADII — SHARP BY DEFAULT</div>
  <div class="row">
    <div class="box" style="border-radius:0"><b>None</b><span>0</span></div>
    <div class="box" style="border-radius:2px"><b>XS</b><span>2px</span></div>
    <div class="box" style="border-radius:4px;border-color:var(--bb-brand-primary-border)"><b>SM ◄</b><span>4px · button</span></div>
    <div class="box" style="border-radius:8px;border-color:var(--bb-brand-primary-border)"><b>MD ◄</b><span>8px · card</span></div>
    <div class="box" style="border-radius:12px"><b>LG</b><span>12px</span></div>
    <div class="box" style="border-radius:999px"><b>Pill</b><span>chip only</span></div>
  </div>
  <div class="brand-tag">Brand defaults — <em>button/input = SM</em>, <em>card = MD</em>. XL (16px) <em>never</em> used on primary UI.</div>
</div>
</body>
</html>
