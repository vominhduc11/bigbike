<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Motion — Durations</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 14px 0; color: var(--bb-text-muted); }
  .row { display:flex; align-items:center; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--bb-border-subtle); }
  .row:last-child { border-bottom:none; }
  .tok { width: 90px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bb-text-primary); font-weight: 700; }
  .ms { width: 56px; font-size: 11px; color: var(--bb-text-muted); }
  .track { flex: 1; height: 22px; background: var(--bb-bg-surface); border-radius: 3px; position: relative; overflow: hidden; }
  .pulse { position: absolute; inset: 0 auto 0 0; width: 20px; background: var(--bb-brand-primary); animation-iteration-count: infinite; animation-timing-function: cubic-bezier(0.2,0,0,1); animation-name: slide; }
  @keyframes slide { 0% { left: -20px } 50% { left: calc(100% - 0px) } 50.01% { left: calc(100% - 0px) } 100% { left: -20px } }
  .use { width: 140px; font-size: 10px; color: var(--bb-text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">MOTION — DURATIONS + EASING</div>
  <div class="row"><div class="tok">Instant</div><div class="ms">80ms</div><div class="track"><div class="pulse" style="animation-duration:160ms"></div></div><div class="use">micro state flip</div></div>
  <div class="row"><div class="tok">Fast</div><div class="ms">140ms</div><div class="track"><div class="pulse" style="animation-duration:280ms"></div></div><div class="use">hover · focus</div></div>
  <div class="row"><div class="tok">Normal</div><div class="ms">220ms</div><div class="track"><div class="pulse" style="animation-duration:440ms"></div></div><div class="use">card lift · toast</div></div>
  <div class="row"><div class="tok">Slow</div><div class="ms">360ms</div><div class="track"><div class="pulse" style="animation-duration:720ms"></div></div><div class="use">drawer · hero bar</div></div>
  <div style="margin-top:12px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--bb-text-muted)">Standard ease: <span style="color:#fff">cubic-bezier(.2,0,0,1)</span></div>
</div>
</body>
</html>
