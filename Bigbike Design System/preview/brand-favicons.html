<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Brand — Favicons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 14px 0; color: var(--bb-text-muted); }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .f { aspect-ratio: 1; background: #141414; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; display:flex; align-items:center; justify-content:center; padding: 12px; }
  .f img { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <h3 class="title">FAVICONS · 8 VARIANTS</h3>
  <div class="grid">
    <div class="f"><img src="../assets/favicon/favicon-01.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-02.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-03.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-04.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-05.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-06.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-07.svg"></div>
    <div class="f"><img src="../assets/favicon/favicon-08.svg"></div>
  </div>
</div>
</body>
</html>
