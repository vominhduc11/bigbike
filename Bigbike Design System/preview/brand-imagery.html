<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Brand — Imagery Vibe</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 14px; display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile { aspect-ratio: 16/10; border-radius: 8px; overflow:hidden; position: relative; border: 1px solid rgba(255,255,255,0.08); }
  .tile img { width: 100%; height: 100%; object-fit: cover; display:block; }
  .wash { filter: saturate(1.4) brightness(0.72); }
  .tile.wash:after { content:""; position: absolute; inset: 0; background: rgba(160,0,0,0.35); mix-blend-mode: multiply; }
  .lbl { position: absolute; top: 10px; left: 12px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; font-weight: 700; background: rgba(0,0,0,0.6); padding: 3px 8px; z-index: 2; }
  .kicker { position:absolute; bottom: 12px; left: 12px; z-index: 2; font-family: var(--bb-font-display); text-transform: uppercase; font-size: 14px; color: #fff; letter-spacing: 0.02em; line-height: 1.15; max-width: 80%; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="tile">
    <span class="lbl">CLEAN · DARK GREY</span>
    <img src="../assets/signage/signage-01.png" alt="">
    <div class="kicker">Product — neutral<br>radial highlight</div>
  </div>
  <div class="tile wash">
    <span class="lbl">BIGBIKE RED WASH</span>
    <img src="../assets/signage/signage-05.png" alt="">
    <div class="kicker">Editorial —<br>saturate 1.4 · brightness 0.72 · #A00000 @ 35%</div>
  </div>
</div>
</body>
</html>
