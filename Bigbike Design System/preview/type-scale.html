<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 14px 0; color: var(--bb-text-muted); }
  .row { display:flex; align-items:baseline; gap: 20px; padding: 6px 0; border-bottom: 1px solid var(--bb-border-subtle); }
  .row:last-child { border-bottom: none; }
  .tag { width: 110px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bb-text-muted); flex-shrink:0; }
  .px { width: 56px; font-size: 10px; color: var(--bb-text-muted); text-align: right; flex-shrink:0; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">TYPE SCALE — PRODUCT UI</div>
  <div class="row"><div class="tag">Hero</div><div class="px">88px</div><div style="font-family:var(--bb-font-display);font-size:56px;letter-spacing:0.01em;line-height:1">SALE 20%</div></div>
  <div class="row"><div class="tag">H1</div><div class="px">48px</div><div style="font-family:var(--bb-font-display);font-size:40px;text-transform:uppercase;letter-spacing:0.01em;line-height:1.05">Sản phẩm nổi bật</div></div>
  <div class="row"><div class="tag">H2</div><div class="px">32px</div><div style="font-family:var(--bb-font-display);font-size:28px;text-transform:uppercase;line-height:1.1">Danh mục</div></div>
  <div class="row"><div class="tag">H3</div><div class="px">22px</div><div style="font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:0.04em">LS2 MX436 Pioneer</div></div>
  <div class="row"><div class="tag">Body L</div><div class="px">18px</div><div style="font-size:17px;line-height:1.6">Tư vấn kỹ, giao hàng toàn quốc, cam kết chính hãng 100%.</div></div>
  <div class="row"><div class="tag">Body</div><div class="px">16px</div><div style="font-size:15px;line-height:1.6;color:var(--bb-text-secondary)">Đồng hành cùng rider Việt Nam từ 2013.</div></div>
  <div class="row"><div class="tag">Meta/Kicker</div><div class="px">12px</div><div style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--bb-brand-primary);font-weight:700">HOT OFFER · 20% OFF</div></div>
</div>
</body>
</html>
