<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Product Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .title { grid-column: 1/-1; font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0; color: var(--bb-text-muted); }
  .prod { background: #141414; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.24); display:flex; flex-direction:column; position: relative; }
  .prod.hover { border-color: rgba(249,6,6,0.36); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.32); }
  .media { height: 130px; background: radial-gradient(circle at 50% 45%, #2a2a2a 0%, #141414 70%); position: relative; display:flex; align-items:center; justify-content:center; font-size: 28px; color: rgba(255,255,255,0.15); font-family: var(--bb-font-display); text-transform: uppercase; }
  .media:before { content: "HELMET"; }
  .tag { position: absolute; top: 8px; left: 8px; background: #f90606; color: #fff; font-weight: 700; font-size: 10px; padding: 3px 6px; letter-spacing: 0.08em; }
  .slide-bar { position:absolute; inset: auto 0 0 0; background:#000; color:#fff; font-family: var(--bb-font-display); text-align:center; padding: 8px 0; font-size: 11px; letter-spacing: 0.1em; }
  .body { padding: 10px 12px 12px; display:flex; flex-direction:column; gap: 3px; }
  .brand { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--bb-brand-primary); font-weight: 700; }
  .name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.25; }
  .price { display:flex; align-items:baseline; gap: 8px; margin-top: 4px; }
  .price b { color: var(--bb-brand-primary); font-weight: 700; font-size: 15px; }
  .price s { color: var(--bb-text-muted); font-size: 11px; }
  .stars { font-size: 10px; color: #f99d1c; letter-spacing: 0.1em; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">PRODUCT CARD — REST · HOVER</div>
  <div class="prod">
    <div class="media"><span class="tag">-20%</span></div>
    <div class="body">
      <div class="brand">LS2</div>
      <div class="name">LS2 MX436 Pioneer Dual Sport</div>
      <div class="stars">★★★★★ <span style="color:rgba(255,255,255,0.45)">(42)</span></div>
      <div class="price"><b>2.590.000 ₫</b><s>3.240.000 ₫</s></div>
    </div>
  </div>
  <div class="prod hover">
    <div class="media"><span class="tag">-20%</span><div class="slide-bar">THÊM VÀO GIỎ HÀNG</div></div>
    <div class="body">
      <div class="brand">LS2</div>
      <div class="name">LS2 MX436 Pioneer Dual Sport</div>
      <div class="stars">★★★★★ <span style="color:rgba(255,255,255,0.45)">(42)</span></div>
      <div class="price"><b>2.590.000 ₫</b><s>3.240.000 ₫</s></div>
    </div>
  </div>
</div>
</body>
</html>
