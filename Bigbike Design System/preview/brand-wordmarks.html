<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Brand — Wordmarks &amp; Slogan</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 16px 18px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .tile { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; display:flex; align-items:center; justify-content:center; padding: 18px; min-height: 160px; position: relative; }
  .tile img { max-width: 100%; max-height: 120px; object-fit: contain; }
  .lbl { position: absolute; top: 8px; left: 10px; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 700; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="tile"><span class="lbl">WORDMARK</span><img src="../assets/logo/bigbike-logo-wordmark.png" alt=""></div>
  <div class="tile"><span class="lbl">MONO WHITE</span><img src="../assets/logo/bigbike-logo-mono-white.png" alt=""></div>
  <div class="tile"><span class="lbl">SLOGAN LOCKUP</span><img src="../assets/logo/bigbike-slogan-dont-let-behind.png" alt=""></div>
</div>
</body>
</html>
