<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Type — Display (Bungee)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 24px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 16px 0; color: var(--bb-text-muted); }
  .big { font-family: var(--bb-font-display); letter-spacing: 0.01em; line-height: 1.02; font-size: 72px; text-transform: uppercase; margin: 0; }
  .big em { color: var(--bb-brand-primary); font-style: normal; }
  .sub { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.02em; margin: 12px 0 0 0; opacity: 0.8; line-height: 1.1; }
  .meta { margin-top: 18px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bb-text-muted); display:flex; gap: 20px; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">DISPLAY / BUNGEE REGULAR</div>
  <h1 class="big">BIG <em>BIKE</em></h1>
  <div class="sub">Don't Let Behind · Ride Together</div>
  <div class="meta">
    <span>Bungee 400</span><span>Uppercase</span><span>Tracking 0.01em</span><span>LH 1.02</span>
  </div>
</div>
</body>
</html>
