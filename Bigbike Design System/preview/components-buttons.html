<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 16px 0; color: var(--bb-text-muted); }
  .row { display:flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 14px; }
  .btn { font-family: var(--bb-font-body); font-weight: 700; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 22px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; line-height: 1; transition: all 220ms cubic-bezier(.2,0,0,1); }
  .btn-primary { background: #f90606; color: #fff; box-shadow: 0 12px 30px rgba(249,6,6,0.22); }
  .btn-primary.hover { background: #d90404; transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: #fff; border-color: rgba(255,255,255,0.28); }
  .btn-ghost { background: transparent; color: #fff; padding: 12px 10px; }
  .btn-ghost:after { content:" →"; color: var(--bb-brand-primary); }
  .btn-disabled { background: #f90606; color: #fff; opacity: 0.48; cursor: not-allowed; }
  .btn-sm { padding: 8px 14px; font-size: 11px; }
  .lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bb-text-muted); width: 80px; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">BUTTONS</div>
  <div class="row"><div class="lbl">Primary</div>
    <button class="btn btn-primary">Mua ngay</button>
    <button class="btn btn-primary hover">Hover</button>
    <button class="btn btn-disabled">Hết hàng</button>
  </div>
  <div class="row"><div class="lbl">Secondary</div>
    <button class="btn btn-secondary">Xem chi tiết</button>
    <button class="btn btn-ghost">Xem tất cả</button>
  </div>
  <div class="row"><div class="lbl">Small</div>
    <button class="btn btn-primary btn-sm">Thêm vào giỏ</button>
    <button class="btn btn-secondary btn-sm">So sánh</button>
  </div>
</div>
</body>
</html>
