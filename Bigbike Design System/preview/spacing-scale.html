<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 14px 0; color: var(--bb-text-muted); }
  .row { display:flex; align-items:center; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--bb-border-subtle); }
  .row:last-child { border-bottom: none; }
  .tok { width: 70px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bb-text-muted); }
  .px { width: 60px; font-size: 11px; color: var(--bb-text-secondary); font-weight: 700; }
  .bar { height: 12px; background: var(--bb-brand-primary); border-radius: 2px; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">SPACING — 4PX BASE</div>
  <div class="row"><div class="tok">space-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tok">space-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="tok">space-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tok">space-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="tok">space-6</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="tok">space-8</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">space-12</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="tok">space-16</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="tok">space-24</div><div class="px">96px</div><div class="bar" style="width:96px"></div></div>
</div>
</body>
</html>
