<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Brand — Icon Set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 18px 22px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 12px 0; color: var(--bb-text-muted); }
  .title em { color: var(--bb-brand-primary); font-style: normal; }
  .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap: 6px; }
  .i { aspect-ratio: 1; background: #141414; border-radius: 6px; display:flex; align-items:center; justify-content:center; padding: 6px; overflow: hidden; }
  .i img { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <h3 class="title">BIGBIKE ICON SET — <em>48 ICONS</em>, FLAT RED TILE, WHITE GLYPH</h3>
  <div class="grid" id="g"></div>
</div>
<script>
  const g = document.getElementById('g');
  for (let i = 1; i <= 48; i++) {
    const n = String(i).padStart(2, '0');
    const d = document.createElement('div');
    d.className = 'i';
    d.innerHTML = `<img src="../assets/icons/bigbike-icon-${n}.svg" alt="">`;
    g.appendChild(d);
  }
</script>
</body>
</html>
