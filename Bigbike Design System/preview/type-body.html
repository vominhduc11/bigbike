<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Type — Body (Exo)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 26px; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 12px; letter-spacing: 0.06em; margin: 0 0 14px 0; color: var(--bb-text-muted); }
  .row { display: flex; align-items: baseline; gap: 22px; padding: 6px 0; border-bottom: 1px solid var(--bb-border-subtle); }
  .row:last-child { border-bottom: none; }
  .label { width: 128px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bb-text-muted); flex-shrink:0; }
  .sample { font-family: var(--bb-font-body); }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <div class="title">BODY / EXO RAMP</div>
  <div class="row"><div class="label">Light 300</div><div class="sample" style="font-weight:300;font-size:20px">Đồ bảo hộ biker — Bigbike từ 2013</div></div>
  <div class="row"><div class="label">Regular 400</div><div class="sample" style="font-weight:400;font-size:20px">Đồ bảo hộ biker — Bigbike từ 2013</div></div>
  <div class="row"><div class="label">Medium 500</div><div class="sample" style="font-weight:500;font-size:20px">Đồ bảo hộ biker — Bigbike từ 2013</div></div>
  <div class="row"><div class="label">Semibold 600</div><div class="sample" style="font-weight:600;font-size:20px">Đồ bảo hộ biker — Bigbike từ 2013</div></div>
  <div class="row"><div class="label">Bold 700</div><div class="sample" style="font-weight:700;font-size:20px">Đồ bảo hộ biker — Bigbike từ 2013</div></div>
  <div class="row"><div class="label">Black 900 italic</div><div class="sample" style="font-weight:900;font-style:italic;font-size:22px;text-transform:uppercase;letter-spacing:0.01em">ĐỒ BẢO HỘ BIKER</div></div>
</div>
</body>
</html>
