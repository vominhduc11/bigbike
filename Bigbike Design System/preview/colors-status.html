<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Colors — Status</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bb-bg-page); color: var(--bb-text-primary); font-family: var(--bb-font-body); }
  .card { padding: 22px 24px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .st { border-radius: var(--bb-radius-sm); padding: 12px 14px; display:flex; flex-direction:column; gap:10px; border:1px solid; font-family: var(--bb-font-body); }
  .st b { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .chip { display:inline-block; padding: 4px 8px; font-size: 10px; font-weight:700; letter-spacing: 0.08em; text-transform:uppercase; border-radius: 3px; align-self:flex-start; }
  .hex { font-size: 10px; opacity: 0.7; }
  .title { font-family: var(--bb-font-display); text-transform: uppercase; font-size: 13px; letter-spacing: 0.06em; margin: 0 0 14px 0; }
</style>
</head>
<body class="bb-theme-dark">
<div class="card">
  <h3 class="title">STATUS — STOCK + PAYMENT BADGES</h3>
  <div class="grid">
    <div class="st" style="background:rgba(98,187,70,0.14);border-color:rgba(98,187,70,0.34);color:#62bb46">
      <b>Success</b><div class="chip" style="background:#62bb46;color:#fff">Còn hàng</div><div class="hex">#62BB46</div>
    </div>
    <div class="st" style="background:rgba(249,157,28,0.14);border-color:rgba(249,157,28,0.34);color:#f99d1c">
      <b>Warning</b><div class="chip" style="background:#f99d1c;color:#111">Sắp hết hàng</div><div class="hex">#F99D1C</div>
    </div>
    <div class="st" style="background:rgba(249,6,6,0.14);border-color:rgba(249,6,6,0.38);color:#f90606">
      <b>Danger</b><div class="chip" style="background:#f90606;color:#fff">Hết hàng</div><div class="hex">#F90606</div>
    </div>
    <div class="st" style="background:rgba(32,196,244,0.14);border-color:rgba(32,196,244,0.34);color:#20c4f4">
      <b>Info</b><div class="chip" style="background:#20c4f4;color:#111">Đặt trước</div><div class="hex">#20C4F4</div>
    </div>
  </div>
</div>
</body>
</html>
