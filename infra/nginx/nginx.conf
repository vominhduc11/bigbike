# BigBike Production Reverse Proxy
# Assumes:
#   - bigbike-web  reachable at http://web:3000
#   - bigbike-admin reachable at http://admin:80
#   - bigbike-backend reachable at http://backend:8080
#   - TLS terminated at this layer (cert paths below must match your deployment)
#
# Domain layout (adjust SERVER_NAME values as needed):
#   www.bigbike.vn      → Next.js web
#   admin.bigbike.vn    → Vite admin
#   api.bigbike.vn      → Spring Boot backend

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_global:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=10r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name www.bigbike.vn admin.bigbike.vn api.bigbike.vn;
    return 301 https://$host$request_uri;
}

# ── Web (www.bigbike.vn) ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.bigbike.vn;

    ssl_certificate     /etc/nginx/certs/bigbike.vn.crt;
    ssl_certificate_key /etc/nginx/certs/bigbike.vn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers (Next.js also sets these; belt-and-suspenders)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ── Admin (admin.bigbike.vn) ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.bigbike.vn;

    ssl_certificate     /etc/nginx/certs/bigbike.vn.crt;
    ssl_certificate_key /etc/nginx/certs/bigbike.vn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Restrict admin access by IP if desired:
    # allow 203.0.113.0/24;
    # deny all;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://admin:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── API (api.bigbike.vn) ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.bigbike.vn;

    ssl_certificate     /etc/nginx/certs/bigbike.vn.crt;
    ssl_certificate_key /etc/nginx/certs/bigbike.vn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Block /api/internal/* from public internet
    location /api/internal/ {
        deny all;
        return 403;
    }

    # Tighter rate limit on auth endpoints
    location ~ ^/api/v1/(auth|customer/auth)/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=api_global burst=30 nodelay;
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 52m;
    }
}
