name: Secret Artifact Guard

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  block-dangerous-tracked-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect dangerous tracked artifacts
        shell: bash
        run: |
          set -euo pipefail

          PATTERN='(^|/)(\.env($|\..+$)|.*\.save$|.*\.jks$|.*\.keystore$|key\.properties$|service_account.*\.json$|google-services\.json$|link(_auth)?\.txt$|.*(secret|token|auth).*(dump|export|backup|leak).*\.(txt|log|json|save)$)'
          MATCHES="$(git ls-files | grep -Ei "$PATTERN" | grep -Evi '(^|/)\.env\.example$' || true)"

          if [[ -n "${MATCHES}" ]]; then
            echo "Dangerous tracked files detected:"
            echo "${MATCHES}"
            exit 1
          fi

          echo "No dangerous tracked artifacts found."
