services:

  postgres:
    image: postgres:16-alpine
    container_name: bigbike-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bigbike}
      POSTGRES_USER: ${POSTGRES_USER:-bigbike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigbike_dev_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bigbike} -d ${POSTGRES_DB:-bigbike}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: bigbike-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: bigbike-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bigbike-backend:
    build:
      context: ./bigbike-backend
      dockerfile: Dockerfile
    container_name: bigbike-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      BIGBIKE_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bigbike}
      BIGBIKE_DB_USERNAME: ${POSTGRES_USER:-bigbike}
      BIGBIKE_DB_PASSWORD: ${POSTGRES_PASSWORD:-bigbike_dev_only}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BIGBIKE_JWT_SECRET: ${BIGBIKE_JWT_SECRET:-dev-change-me-in-production-needs-32chars!!}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_only}
      MINIO_BUCKET: ${MINIO_BUCKET:-bigbike-media}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  bigbike-web:
    build:
      context: ./bigbike-web
      dockerfile: Dockerfile
    container_name: bigbike-web
    restart: unless-stopped
    depends_on:
      bigbike-backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      BIGBIKE_API_BASE_URL: http://bigbike-backend:8080
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      BIGBIKE_SITE_URL: ${BIGBIKE_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      BIGBIKE_DISABLE_DEV_FALLBACK: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  bigbike-admin:
    build:
      context: ./bigbike-admin
      dockerfile: Dockerfile
    container_name: bigbike-admin
    restart: unless-stopped
    depends_on:
      bigbike-backend:
        condition: service_healthy
    ports:
      - "4000:80"
    environment:
      VITE_ADMIN_API_BASE: ${VITE_ADMIN_API_BASE:-http://localhost:8080/api/v1}
      VITE_USE_ADMIN_MOCK: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: bigbike-dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
