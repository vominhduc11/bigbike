spring.datasource.url=jdbc:h2:mem:bigbike;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creates schema from entities. Main Flyway migrations use PostgreSQL-specific
# syntax (USING column::type in ALTER COLUMN) that H2 cannot parse.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.flyway.enabled=false
