spring.application.name=bigbike-backend

spring.datasource.url=${BIGBIKE_DB_URL:jdbc:postgresql://localhost:5432/bigbike}
spring.datasource.username=${BIGBIKE_DB_USERNAME:bigbike}
spring.datasource.password=${BIGBIKE_DB_PASSWORD:bigbike_dev_only}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Hibernate performance — batch fetch collapses N+1 lazy-collection loads
# (product gallery/videos/specs/variants/options) into IN(...) batches;
# jdbc.batch_size + order_inserts/updates group bulk INSERT/UPDATE flushes.
spring.jpa.properties.hibernate.default_batch_fetch_size=25
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS configuration
bigbike.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:4000,http://localhost:4001}

# Cookie security — set to false only in local dev without HTTPS
bigbike.cookies.secure=${BIGBIKE_COOKIES_SECURE:true}

# Reverse-proxy IPs trusted to set X-Forwarded-For (rate limiting keys the bucket on the
# real client IP). Comma-separated; each entry is an exact IP or a CIDR range, e.g.
# 172.16.0.0/12. Default covers localhost only. When the backend runs behind nginx or in
# Docker, set BIGBIKE_TRUSTED_PROXIES to the proxy IP / Docker bridge subnet — otherwise
# every external request shares one bucket and per-IP rate limiting collapses.
# See docs/engineering/DEPLOYMENT_GUIDE.md.
bigbike.trusted-proxies=${BIGBIKE_TRUSTED_PROXIES:127.0.0.1,::1}

# JWT configuration
bigbike.jwt.secret=${BIGBIKE_JWT_SECRET:dev-change-me-in-production-needs-32chars!!}
bigbike.jwt.access-token-ttl-seconds=900
bigbike.jwt.refresh-token-ttl-seconds=604800

# MinIO — admin media upload and migration media copy
bigbike.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
bigbike.minio.access-key=${MINIO_ROOT_USER:minio_admin}
bigbike.minio.secret-key=${MINIO_ROOT_PASSWORD:minio_dev_only}
bigbike.minio.bucket=${MINIO_BUCKET:bigbike-media}

# WordPress migration — disabled by default, dry-run only
bigbike.migration.wordpress.enabled=false
bigbike.migration.wordpress.sql-dump-path=
bigbike.migration.wordpress.uploads-path=
bigbike.migration.wordpress.table-prefix=kd_
bigbike.migration.wordpress.dry-run=true
bigbike.migration.wordpress.batch-size=500

# Phase 2E — media copy to MinIO (S3-compatible)
bigbike.migration.wordpress.minio-endpoint=${MINIO_ENDPOINT:http://localhost:9000}
bigbike.migration.wordpress.minio-access-key=${MINIO_ROOT_USER:minio_admin}
bigbike.migration.wordpress.minio-secret-key=${MINIO_ROOT_PASSWORD:minio_dev_only}
bigbike.migration.wordpress.minio-bucket=${MINIO_BUCKET:bigbike-media}

# Media URLs persisted by admin write paths must stay under this public MinIO base URL.
bigbike.media.public-base-url=${BIGBIKE_MEDIA_PUBLIC_BASE_URL:${MINIO_ENDPOINT:http://localhost:9000}/${MINIO_BUCKET:bigbike-media}}

# Transactional email (JavaMailSender) — optional; all senders degrade gracefully when absent.
# Set BIGBIKE_MAIL_HOST to enable. For Gmail use smtp.gmail.com:587 with an App Password.
spring.mail.host=${BIGBIKE_MAIL_HOST:}
spring.mail.port=${BIGBIKE_MAIL_PORT:587}
spring.mail.username=${BIGBIKE_MAIL_USERNAME:}
spring.mail.password=${BIGBIKE_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${BIGBIKE_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${BIGBIKE_MAIL_STARTTLS:true}
bigbike.mail.from=${BIGBIKE_MAIL_FROM:no-reply@bigbike.vn}
bigbike.mail.admin=${BIGBIKE_MAIL_ADMIN:info@bigbike.vn}
bigbike.mail.verify-base-url=${BIGBIKE_MAIL_VERIFY_BASE_URL:https://bigbike.vn/xac-nhan-email}
bigbike.mail.reset-base-url=${BIGBIKE_MAIL_RESET_BASE_URL:https://bigbike.vn/quen-mat-khau}
bigbike.site.base-url=${BIGBIKE_SITE_BASE_URL:https://bigbike.vn}
bigbike.admin.base-url=${BIGBIKE_ADMIN_BASE_URL:https://admin.bigbike.vn}

# Next.js on-demand revalidation — set both to enable cache purging after admin mutations
bigbike.web.revalidate-url=${WEB_REVALIDATE_URL:}
bigbike.web.revalidate-secret=${WEB_REVALIDATE_SECRET:}

# Shared secret for internal endpoints (/api/internal/**) consumed by bigbike-web proxy.
# When set, all callers must send the same value in the X-Internal-Token header.
# Leave empty in local dev; set a random string in staging/prod via BIGBIKE_INTERNAL_TOKEN.
bigbike.internal.token=${BIGBIKE_INTERNAL_TOKEN:}

# Dev header auth bypass — MUST be false in production; only set true in dev/test environments
bigbike.auth.dev-header-enabled=false

# Multipart upload limits — match the 50 MB cap enforced in AdminMediaService
spring.servlet.multipart.max-file-size=52MB
spring.servlet.multipart.max-request-size=55MB

# Actuator — expose health + show details for diagnosis (prod overrides with show-details=never)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
