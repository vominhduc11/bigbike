# ── Production profile overrides ────────────────────────────────────────────
# This file is loaded when SPRING_PROFILES_ACTIVE contains "prod".
# Secrets must come from environment variables — no plaintext values here.

# Flyway: prod only runs versioned migrations, never dev-seed data
spring.flyway.locations=classpath:db/migration

# Logging: structured JSON output for log aggregators (Loki/ELK)
logging.level.root=WARN
logging.level.com.bigbike=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.charset.console=UTF-8

# Disable SpringDoc / Swagger UI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator: expose only health, info, metrics, prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.prometheus.enabled=true

# Datasource: pool tuned for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# HTTP: compression + timeouts
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/html
server.compression.min-response-size=2048
server.tomcat.connection-timeout=20s
