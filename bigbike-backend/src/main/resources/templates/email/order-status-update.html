<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cập nhật đơn hàng — BigBike</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f6f8">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

        <tr th:replace="~{email/layout :: header-row}"></tr>

        <tr>
          <td style="background-color:#ffffff;padding:32px;border-left:1px solid #e5e7eb;border-right:1px solid #e5e7eb;">

            <!-- Status badge -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
              <tr>
                <td th:style="'background-color:' + ${badgeColor} + ';border-radius:20px;padding:4px 14px;'"
                    style="background-color:#e5e7eb;border-radius:20px;padding:4px 14px;">
                  <span th:style="'font-size:12px;font-weight:600;color:' + ${badgeTextColor} + ';letter-spacing:0.3px;'"
                        th:text="${statusLabel}"
                        style="font-size:12px;font-weight:600;color:#374151;">ĐANG XỬ LÝ</span>
                </td>
              </tr>
            </table>

            <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#151515;"
                th:text="${headline}">Đơn hàng đang được xử lý</h1>
            <p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;line-height:1.6;">
              Xin chào <strong th:text="${customerName}">Khách hàng</strong>,<br/>
              <span th:text="${bodyText}">Đơn hàng của bạn đã được cập nhật trạng thái.</span>
            </p>

            <!-- Order info -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                   style="background-color:#f7f7f8;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:24px;">
              <tr>
                <td style="padding:20px 24px;">
                  <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:6px;">Mã đơn hàng</td>
                      <td align="right" style="font-size:15px;font-weight:700;color:#151515;padding-bottom:6px;"
                          th:text="'#' + ${orderNumber}">#BB-2024-001</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;">Tổng tiền</td>
                      <td align="right" style="font-size:14px;font-weight:600;color:#151515;"
                          th:text="${totalFormatted}">0 VND</td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <!-- Customer-visible note from admin -->
            <div th:if="${hasNote}"
                 style="background-color:#f0fdf4;border-left:4px solid #62bb46;padding:14px 16px;border-radius:0 6px 6px 0;margin-bottom:24px;">
              <p style="margin:0 0 4px 0;font-size:12px;font-weight:600;color:#166534;">Ghi chú từ BigBike:</p>
              <p style="margin:0;font-size:13px;color:#166534;line-height:1.5;" th:text="${note}">Ghi chú</p>
            </div>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="border-radius:6px;background-color:#F90606;">
                  <a th:href="${orderUrl}" href="#"
                     style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:6px;">
                    Xem đơn hàng →
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <tr th:replace="~{email/layout :: footer-row}"></tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
