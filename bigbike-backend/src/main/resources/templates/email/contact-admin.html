<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Liên hệ mới — BigBike Admin</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f6f8">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

        <tr th:replace="~{email/layout :: header-row}"></tr>

        <tr>
          <td style="background-color:#ffffff;padding:32px;border-left:1px solid #e5e7eb;border-right:1px solid #e5e7eb;">

            <h1 style="margin:0 0 4px 0;font-size:22px;font-weight:700;color:#151515;">
              📬 Liên hệ mới từ website
            </h1>
            <p style="margin:0 0 24px 0;font-size:14px;color:#6b7280;">
              Khách hàng gửi qua form liên hệ — vui lòng phản hồi trong thời gian sớm nhất.
            </p>

            <!-- Contact info -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                   style="background-color:#f7f7f8;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:20px;">
              <tr>
                <td style="padding:20px 24px;">
                  <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:10px;width:100px;">Họ tên</td>
                      <td style="font-size:14px;font-weight:600;color:#151515;padding-bottom:10px;"
                          th:text="${fullName}">Nguyễn Văn A</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:10px;">Điện thoại</td>
                      <td style="padding-bottom:10px;">
                        <a th:href="'tel:' + ${phone}" th:text="${phone}" href="#"
                           style="font-size:14px;font-weight:600;color:#F90606;text-decoration:none;">0900000000</a>
                      </td>
                    </tr>
                    <tr th:if="${email != null}">
                      <td style="font-size:13px;color:#6b7280;padding-bottom:10px;">Email</td>
                      <td style="padding-bottom:10px;">
                        <a th:href="'mailto:' + ${email}" th:text="${email}" href="#"
                           style="font-size:14px;color:#F90606;text-decoration:none;">email@example.com</a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <!-- Message content -->
            <p style="margin:0 0 8px 0;font-size:13px;font-weight:600;color:#151515;">Nội dung:</p>
            <div style="background-color:#f7f7f8;border-radius:6px;border:1px solid #e5e7eb;padding:16px 20px;margin-bottom:24px;">
              <p style="margin:0;font-size:14px;color:#333333;line-height:1.7;white-space:pre-wrap;"
                 th:text="${content}">Nội dung liên hệ...</p>
            </div>

            <!-- Quick reply CTA -->
            <div th:if="${email != null}">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-radius:6px;background-color:#0a0a0a;">
                    <a th:href="'mailto:' + ${email}" href="#"
                       style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:6px;">
                      Trả lời email →
                    </a>
                  </td>
                </tr>
              </table>
            </div>

          </td>
        </tr>

        <tr th:replace="~{email/layout :: footer-row}"></tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
