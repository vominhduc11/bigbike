<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Đơn hàng mới — BigBike Admin</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f6f8">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

        <tr th:replace="~{email/layout :: header-row}"></tr>

        <tr>
          <td style="background-color:#ffffff;padding:32px;border-left:1px solid #e5e7eb;border-right:1px solid #e5e7eb;">

            <h1 style="margin:0 0 4px 0;font-size:22px;font-weight:700;color:#151515;">
              🛒 Đơn hàng mới!
            </h1>
            <p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;">
              Vừa có đơn hàng mới cần xử lý.
            </p>

            <!-- Order summary -->
            <table width="100%" cellpadding="0" cellspacing="0" border="0"
                   style="background-color:#f7f7f8;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:24px;">
              <tr>
                <td style="padding:20px 24px;">
                  <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:8px;">Mã đơn hàng</td>
                      <td align="right" style="font-size:16px;font-weight:700;color:#F90606;padding-bottom:8px;"
                          th:text="'#' + ${orderNumber}">#BB-2024-001</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:8px;">Khách hàng</td>
                      <td align="right" style="font-size:14px;color:#151515;padding-bottom:8px;"
                          th:text="${customerName}">Khách hàng</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:8px;">Điện thoại</td>
                      <td align="right" style="font-size:14px;color:#151515;padding-bottom:8px;"
                          th:text="${customerPhone ?: '—'}">0900000000</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-bottom:8px;">Email</td>
                      <td align="right" style="font-size:14px;color:#151515;padding-bottom:8px;"
                          th:text="${customerEmail ?: '—'}">khach@email.com</td>
                    </tr>
                    <tr>
                      <td colspan="2" style="border-top:1px solid #e5e7eb;padding-top:12px;padding-bottom:0;"></td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-top:12px;">Tổng tiền</td>
                      <td align="right" style="font-size:16px;font-weight:700;color:#151515;padding-top:12px;"
                          th:text="${totalFormatted}">0 VND</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-top:6px;">Thanh toán</td>
                      <td align="right" style="font-size:14px;color:#151515;padding-top:6px;"
                          th:text="${paymentLabel}">COD</td>
                    </tr>
                    <tr>
                      <td style="font-size:13px;color:#6b7280;padding-top:6px;">Nguồn</td>
                      <td align="right" style="font-size:14px;color:#151515;padding-top:6px;"
                          th:text="${source}">WEB</td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="border-radius:6px;background-color:#0a0a0a;">
                  <a th:href="${adminOrderUrl}" href="#"
                     style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:6px;">
                    Xem trong Admin →
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <tr th:replace="~{email/layout :: footer-row}"></tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
