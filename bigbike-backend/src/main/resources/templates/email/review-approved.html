<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Đánh giá của bạn đã được đăng — BigBike</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f5f6f8">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

        <tr th:replace="~{email/layout :: header-row}"></tr>

        <!-- Body -->
        <tr>
          <td style="background-color:#ffffff;padding:32px;border-left:1px solid #e5e7eb;border-right:1px solid #e5e7eb;">

            <!-- Icon -->
            <p style="margin:0 0 16px 0;font-size:40px;text-align:center;">⭐</p>

            <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#151515;">
              Đánh giá của bạn đã được đăng!
            </h1>
            <p style="margin:0 0 24px 0;font-size:15px;color:#4b5563;line-height:1.6;">
              Xin chào <strong th:text="${authorName}">Khách hàng</strong>,<br/>
              Cảm ơn bạn đã dành thời gian chia sẻ trải nghiệm. Đánh giá của bạn về
              <strong th:text="${productName}">sản phẩm</strong> đã được kiểm duyệt và hiển thị công khai.
            </p>

            <!-- CTA -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="border-radius:6px;background-color:#F90606;">
                  <a th:href="${productUrl}" href="#"
                     style="display:inline-block;padding:12px 28px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:6px;">
                    Xem đánh giá →
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <tr th:replace="~{email/layout :: footer-row}"></tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
