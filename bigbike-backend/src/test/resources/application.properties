spring.datasource.url=jdbc:h2:mem:bigbike;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creates schema from entities. Main Flyway migrations use PostgreSQL-specific
# syntax (USING column::type in ALTER COLUMN) that H2 cannot parse.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.flyway.enabled=false

# Enable dev header auth bypass in the test environment so existing tests using
# X-Admin-Role / X-Admin-Permissions headers continue to work.
# AdminMediaP0Test overrides this to false via @TestPropertySource to test the disabled path.
bigbike.auth.dev-header-enabled=true

# Required by DataInitializer (no default since we removed admin123 hardcode)
bigbike.seed.admin-password=Test@Seed!12345

# Internal redirect endpoints: open without token in tests (no token configured).
# CMS-002: allow-open=true in test profile mirrors the dev profile so internal redirect
# tests pass without needing to set BIGBIKE_INTERNAL_TOKEN in the test environment.
bigbike.internal.allow-open=true

# Minio: use fixed test credentials so MinioClient can be instantiated even without a
# running MinIO server. The bucket init will fail gracefully (caught in ensureBucket).
bigbike.minio.endpoint=http://localhost:9000
bigbike.minio.access-key=test-access-key
bigbike.minio.secret-key=test-secret-key
bigbike.minio.bucket=bigbike-test
