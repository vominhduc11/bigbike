# Profile for Testcontainers tests that require real PostgreSQL.
# @ServiceConnection on PostgreSQLContainer overrides spring.datasource.* automatically.
# We enable Flyway here so all migrations run on the container, and turn off the
# Hibernate create-drop that the base application.properties uses for H2.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none
# Include test-specific migrations (e.g. V26_5 seeds products for V27's FK references)
spring.flyway.locations=classpath:db/migration,classpath:db/testmigration
# JWT secret required for non-dev profiles — use a fixed test-only value
bigbike.jwt.secret=tc-testcontainers-fixed-secret-for-ci-tests-32chars
# CORS: must be non-localhost in non-dev profiles
bigbike.cors.allowed-origins=https://tc-test.bigbike.vn
