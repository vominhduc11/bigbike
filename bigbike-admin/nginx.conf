server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # All assets we serve are UTF-8. Without this directive nginx omits the
    # charset parameter on Content-Type, and `X-Content-Type-Options: nosniff`
    # below blocks the browser from sniffing it — causing Vietnamese strings
    # bundled into the JS to render as mojibake (Ä‘, Æ°, á»…).
    charset utf-8;
    charset_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy all /api/v1/* calls to the backend container.
    # NGINX_BACKEND_URL is substituted at container start via envsubst.
    location /api/ {
        proxy_pass http://bigbike-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Proxy new relative /media/… URLs (from backend publicUrl field).
    # ^~ prevents the static-file regex from intercepting image/video URLs.
    location ^~ /media/ {
        proxy_pass http://minio:9000/bigbike-media/;
        proxy_set_header Host minio;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # Proxy MinIO media for existing DB records that stored the Docker-internal
    # minio:9000 hostname. The admin frontend rewrites those URLs to this path.
    location ^~ /media-proxy/ {
        proxy_pass http://minio:9000/bigbike-media/;
        proxy_set_header Host minio;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    location /ws {
        proxy_pass http://bigbike-backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # nginx: an add_header in a location REPLACES all add_header inherited from the
        # server block. The security headers below must be repeated here so static assets
        # are not served without them.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http://localhost:9000; media-src 'self' blob:; font-src 'self' data:; connect-src 'self' https: ws: wss:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # Security headers — applied to responses from locations that do NOT declare their
    # own add_header (index.html via `location /`, proxied API/media responses).
    # The static-asset location above repeats these because nginx does not merge them.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http://localhost:9000; media-src 'self' blob:; font-src 'self' data:; connect-src 'self' https: ws: wss:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
}
